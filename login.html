<!DOCTYPE html>
<html>
<head>
	<title>9AM - Login</title>
    <link rel="icon" href="9AM.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body> 
	<!-- <img class="wave" src="img/wave.png"> -->
	<div class="containerloreg">
        <div class="logoloreg">
		    <img src="9AM-white.svg" alt="">
        </div>
        <div class="login-content">
            <form action="login.html">
                <!-- <img src="img/avatar.svg"> -->
                <h2 class="title">Masuk</h2>
                <div class="input-div one">
                <div class="i">
                        <i class="fas fa-user"></i>
                </div>
                <div class="div">
                        <h5>Email</h5>
                        <input type="text" class="input" placeholder="Masukkan Email">
                </div>
                </div>
                <div class="input-div pass">
                <div class="i"> 
                        <i class="fas fa-lock"></i>
                </div>
                <div class="div">
                        <h5>Password</h5>
                        <input type="password" class="input" placeholder="Masukkan Password">
                </div>
                </div>
                <a href="#">Forgot Password?</a>
                <input type="submit" class="btn" value="Login">
            </form>
        </div>
    </div>
    <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
